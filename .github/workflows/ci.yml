name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install root + workspaces. Uses `npm ci` when a lockfile exists
      # (deterministic, CI-friendly); falls back to `npm install` for the
      # pre-lockfile initial scaffolding period.
      - name: Install (ci)
        if: hashFiles('package-lock.json') != ''
        run: npm ci
      - name: Install (no lockfile yet)
        if: hashFiles('package-lock.json') == ''
        run: npm install --no-save

      # Typecheck via TS project references. Skip until the agent's first
      # EPIC-01 PR lands the root tsconfig.json.
      - name: Typecheck
        if: hashFiles('tsconfig.json') != ''
        run: npx tsc -b

      # Lint via ESLint flat config. Skip until lint config is scaffolded.
      - name: Lint
        if: hashFiles('eslint.config.js') != '' || hashFiles('eslint.config.mjs') != '' || hashFiles('eslint.config.ts') != '' || hashFiles('.eslintrc*') != ''
        run: npx eslint .

      # Workspace tests. `--if-present` skips workspaces without a test script.
      - name: Test
        if: hashFiles('package.json') != ''
        run: npm test --workspaces --if-present

      # Workspace builds. `--if-present` skips workspaces without a build script.
      - name: Build
        if: hashFiles('package.json') != ''
        run: npm run build --workspaces --if-present
