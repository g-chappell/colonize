              factions. Everything else starts 'unseen'. Covered by
              visibility unit tests.
            depends_on:
              - TASK-021
            pr: https://github.com/g-chappell/colonize/pull/47
            completed: '2026-04-21'
            blocked_reason: null
            last_attempted: '2026-04-21T00:00:00Z'
            attempt_count: 1
