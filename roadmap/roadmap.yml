            depends_on:
              - TASK-013
              - TASK-015
            pr: https://github.com/g-chappell/colonize/pull/44
            completed: '2026-04-21T17:25:00Z'
            blocked_reason: null
            last_attempted: '2026-04-21T17:15:00Z'
            attempt_count: 1
  - id: EPIC-03
    title: World & map
    description: |
      The game world: procedural generation of the ocean map, Rayon
      Passage, floating-city nodes, islands, Red Tide zones, and Fata
      Morgana tiles. Fog of war. Camera / pan / zoom including mobile
      touch. All tiles fixed at map-gen; no island-emergence.
    stories:
      - id: STORY-09
        title: Map data model
        description: |
          Framework-free representation of the map in packages/core:
          tile types, coords, neighbours. Serializable.
        tasks:
          - id: TASK-017
            title: Tile type enum + Map model in packages/core
            status: done
            priority: high
            complexity: medium
            workspaces:
              - core
            description: |
              Define TileType (Ocean, RayonPassage, Island, FloatingCity,
              RedTide, FataMorgana). Map class with get(x,y), neighbours,
              toJSON/fromJSON. Unit tests for coord math and
              serialization.
            depends_on:
              - TASK-004
            pr: https://github.com/g-chappell/colonize/pull/22
            completed: '2026-04-21T12:45:00Z'
            blocked_reason: null
            last_attempted: '2026-04-21T12:30:00Z'
            attempt_count: 1
          - id: TASK-018
            title: Procedural map generator
            status: done
            priority: high
            complexity: large
            workspaces:
              - core
            description: |
              Seedable generator: places a central Rayon Passage corridor
              with 5–8 floating-city nodes, scatters 8–15 islands of
              varied sizes, 1–3 Red Tide zones, a handful of Fata Morgana
              tiles. Parameters: seed, size, faction-start positions.
              Deterministic for same seed.
            depends_on:
              - TASK-017
            pr: https://github.com/g-chappell/colonize/pull/24
            completed: '2026-04-21'
            blocked_reason: null
            last_attempted: '2026-04-21T06:00:00Z'
            attempt_count: 1
      - id: STORY-10
        title: Map rendering
        description: |
          Phaser tilemap renderer fed by the core Map model. Tiles use
          the art-pipeline atlas. Smooth performance on low-end mobile
          targets.
        tasks:
          - id: TASK-019
            title: Phaser GameScene + tile renderer
            status: done
            priority: high
            complexity: large
            workspaces:
              - web
              - core
              - content
            description: |
              GameScene loads a Map from core, renders each tile via the
              atlas. Supports variable tile sizes (animated water
              frames). Camera follows a target; uses culling for
              off-screen tiles.
            depends_on:
              - TASK-010
              - TASK-018
            pr: https://github.com/g-chappell/colonize/pull/25
            completed: '2026-04-21'
            blocked_reason: null
            last_attempted: '2026-04-21T13:00:00Z'
            attempt_count: 1
          - id: TASK-020
            title: 'Camera controls: pan / zoom / mobile touch'
            status: done
            priority: high
            complexity: medium
            workspaces:
              - web
            description: |
              Mouse drag to pan, wheel to zoom, arrow keys to pan on
              desktop. Single-finger drag pan + pinch zoom on mobile.
              Clamp zoom to sensible min/max. Remember last camera
              position per game.
            depends_on:
              - TASK-019
            pr: https://github.com/g-chappell/colonize/pull/26
            completed: '2026-04-21T00:00:00Z'
            blocked_reason: null
            last_attempted: '2026-04-21T00:00:00Z'
            attempt_count: 1
      - id: STORY-11
        title: Fog of war
        description: |
          Per-faction visibility: unexplored tiles are hidden; previously
          explored tiles are dimmed ("last seen" snapshot). Line of
          sight from units + colonies.
        tasks:
          - id: TASK-021
            title: Visibility model in core (unseen / seen / visible)
            status: done
            priority: high
            complexity: medium
            workspaces:
              - core
            description: |
              Per-faction 2D grid with state: unseen (hidden), seen (last
              observed snapshot, dimmed), visible (currently in LoS).
              Update on unit move / colony placement. Serializable.
            depends_on:
              - TASK-017
            pr: https://github.com/g-chappell/colonize/pull/31
            completed: '2026-04-21T00:00:00Z'
            blocked_reason: null
            last_attempted: '2026-04-21T00:00:00Z'
            attempt_count: 1
          - id: TASK-022
            title: Fog overlay in GameScene renderer
            status: done
            priority: high
            complexity: medium
            workspaces:
              - web
            description: |
              Phaser overlay layer darkens seen tiles and hides unseen.
              Animated reveal when a tile transitions unseen→seen.
              Performance-conscious: use a single render-texture mask
              rather than per-tile sprites.
            depends_on:
              - TASK-019
              - TASK-021
            pr: https://github.com/g-chappell/colonize/pull/32
            completed: '2026-04-21T00:00:00Z'
            blocked_reason: null
            last_attempted: '2026-04-21T00:00:00Z'
            attempt_count: 1
      - id: STORY-12
        title: Rayon Passage start region
        description: |
          Always-revealed known-sea corridor at game start, representing
          the existing spine of civilisation. Player starts with Rayon
          Passage visible; frontier + islands are fog-of-war.
