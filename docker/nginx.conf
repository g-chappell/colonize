# Repo copy of the nginx reverse-proxy config.
# Installed at /etc/nginx/sites-available/colonize.conf by /vps-setup.
# Edit this file + re-run /vps-setup (or copy manually) to update.
# TLS block is managed by certbot on the VPS.

server {
    listen 80;
    listen [::]:80;
    server_name colonize.blacksail.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}

# After certbot runs on the VPS, it inserts a 443 ssl server block and the
# HTTP→HTTPS redirect. That state is not mirrored back here — check the
# deployed /etc/nginx config for the actual live state.
