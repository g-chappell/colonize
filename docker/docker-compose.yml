services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: colonize:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colonize}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colonize}
    volumes:
      - db-data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-colonize}']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  db-data:
